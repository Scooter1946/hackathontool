name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Build first: @teamctx/cli imports @teamctx/server, so the server's dist must exist
      # before the cli is typechecked or tested.
      - run: npm run build
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
